# yaml-language-server: $schema=https://raw.githubusercontent.com/ffimnsr/mk-rs/main/docs/schema.json

use_cargo: true

tasks:
  format:
    commands:
      - cargo fmt --all
    description: Format the code using rustfmt.
  lint:
    commands:
      - cargo clippy --all -- -D warnings
    description: Lint the code using clippy, treating warnings as errors.
  lint-stable:
    commands:
      - cargo +stable clippy --workspace --all-targets --all-features -- -D warnings
    description: Lint the code using clippy with the stable Rust toolchain, treating warnings as errors.
  test-stable:
    commands:
      - cargo +stable test --workspace --all-features
    description: Run tests using the stable Rust toolchain.
  docs-check:
    commands:
      - RUSTDOCFLAGS="-D warnings" cargo doc --workspace --no-deps --locked
    description: Check that documentation builds without errors.
  install:
    commands:
      - cargo install --path crates/ee-cli
    description: Install the ee-editor using cargo.
  install-githooks:
    commands:
      - rm -rf .git/hooks
      - mkdir -p .git/hooks
      - cp -r .githooks/* .git/hooks/
    description: Install git hooks from the .githooks directory.
  uninstall-githooks:
    commands:
      - rm -rf .git/hooks
    description: Uninstall git hooks by removing the .git/hooks directory.
  lf:
    commands:
      - |
        git ls-files -z --cached --others --exclude-standard -- '*.rs' ':(exclude)test_assets/**' \
        | xargs -0 -I{} sh -c '[ -f "$1" ] && wc -l -- "$1"' sh {} \
        | awk '$1 > 1000' \
        | sort -nr
    description: Check for Rust files with more than 1000 LOC.
